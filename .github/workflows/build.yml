name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# 同一 ref で新しい push があれば古い実行をキャンセルする
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # タグ push 時に Release へ添付するために必要

jobs:
  build:
    # Apple Silicon (arm64) ネイティブビルド。
    # macos-latest は arm64 ランナー。Ebitengine(cgo) は Xcode SDK の
    # フレームワークを使うため、Linux のような追加ライブラリ導入は不要。
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # 注: CI ではテストを実行しない。
      # 多くのテストは samples/ 配下のサンプルデータに依存するが、samples/ は
      # .gitignore 済み（ローカル専用）のため CI のチェックアウトには存在せず、
      # サンプル依存テストが必ず失敗する。CI の目的は macOS バイナリのビルドと
      # リリース添付なので、テストはローカルで実行する運用とする。
      - name: Build (darwin/arm64)
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: "1"
        run: |
          mkdir -p dist
          go build -o dist/son-et ./cmd/son-et
          file dist/son-et

      - name: Package
        run: |
          cd dist
          tar -czf son-et-darwin-arm64.tar.gz son-et

      # どの実行でも成果物を取得できるよう artifact としてアップロード
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: son-et-darwin-arm64
          path: dist/son-et-darwin-arm64.tar.gz
          if-no-files-found: error

      # タグ push 時のみ GitHub Release に添付
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/son-et-darwin-arm64.tar.gz
